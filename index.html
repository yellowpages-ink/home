<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>yellowpages — something is being written</title>
<style>
  :root{
    --paper:#f3ead0; --ink:#1a1512; --gold:#c99a2e; --brown:#6b5638;
    --line:rgba(26,21,18,.16); --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    min-height:100vh; display:flex; flex-direction:column;
    font-family:var(--serif); color:var(--ink);
    background:
      linear-gradient(rgba(247,239,216,.62), rgba(247,239,216,.62)),
      url('bg-paper.jpg') center / cover fixed,
      #efe4c4;
  }
  .grain{position:fixed; inset:0; width:100vw; height:100vh; pointer-events:none; opacity:.10; mix-blend-mode:multiply; z-index:50}
  .vignette{position:fixed; inset:0; pointer-events:none; z-index:1;
    background:radial-gradient(120% 100% at 50% 40%, transparent 60%, rgba(120,90,48,.14) 88%, rgba(90,64,32,.26) 100%)}
  .wrap{position:relative; z-index:2; max-width:1080px; margin:0 auto; padding:0 24px; width:100%}
  .wrap:last-of-type{margin-top:auto}

  /* ---------- nav ---------- */
  nav{display:flex; align-items:center; justify-content:space-between; padding:22px 0}
  .brand{display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--ink)}
  .brand svg{width:34px; height:auto}
  .brand span{font-size:1.02rem; letter-spacing:.14em}
  /* ---------- hero ---------- */
  header{text-align:center; padding:64px 0 30px}
  .eyebrow{font-family:var(--mono); font-size:.78rem; color:var(--brown); letter-spacing:.06em}
  .eyebrow::after{content:'▊'; color:var(--gold); animation:blink 1.1s steps(1) infinite; margin-left:2px}
  @keyframes blink{50%{opacity:0}}


  /* ---------- paper window ---------- */
  .window{
    max-width:720px; margin:34px auto 0;
    background:linear-gradient(180deg, rgba(210,180,120,.07), rgba(210,180,120,0) 14%), url('strip-paper.jpg') center/cover;
    border:1px solid rgba(26,21,18,.55); border-radius:7px;
    box-shadow:0 2px 0 rgba(26,21,18,.5), 0 24px 48px -18px rgba(80,55,25,.45);
    transform:rotate(-.3deg);
  }
  .bar{
    display:flex; align-items:center; gap:8px; padding:11px 14px;
    border-bottom:1px solid rgba(26,21,18,.35);
  }
  .bar b{width:11px; height:11px; border-radius:50%}
  .bar b:nth-child(1){background:var(--ink)}
  .bar b:nth-child(2){background:var(--gold)}
  .bar b:nth-child(3){background:transparent; border:1.5px solid var(--ink)}
  .bar span{font-family:var(--mono); font-size:.72rem; color:var(--brown); margin-left:8px}
  .page{
    position:relative; padding:34px 40px 30px;
    background-image:repeating-linear-gradient(180deg, transparent 0 27px, rgba(107,86,56,.14) 27px 28px);
    border-radius:0 0 7px 7px;
  }
  .page svg.glyph{display:block; width:min(240px,52%); height:auto; margin:6px auto 14px;
    filter:drop-shadow(0 1px 0 rgba(60,35,10,.2))}
  .page svg.glyph .ink{fill:#171310}
  .bs{
    fill:none; stroke:#fff; stroke-linecap:round;
    stroke-dasharray:1 3; stroke-dashoffset:1.15;
    animation-name:draw; animation-timing-function:cubic-bezier(.42,0,.32,1); animation-fill-mode:forwards;
  }
  .flood{opacity:0; animation:appear .8s ease 2.9s forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes appear{to{opacity:1}}
  .typeline{font-family:var(--mono); font-size:.8rem; color:var(--brown); text-align:center; min-height:1.4em}
  .typeline::before{content:'> '; color:var(--gold)}
  .typeline i{font-style:normal}
  .typeline::after{content:'▊'; animation:blink 1.1s steps(1) infinite}



  footer{
    display:flex; justify-content:center; align-items:center;
    padding:56px 0 40px; font-family:var(--mono); font-size:.72rem; color:var(--brown);
  }

  @media (max-width:760px){
    .page{padding:26px 20px 24px}
  }
  @media (prefers-reduced-motion: reduce){
    .bs{animation:none; stroke-dashoffset:0}
    .flood{animation:none; opacity:1}
    .ticker-inner{animation:none}
    .eyebrow::after,.typeline::after{animation:none}
  }
</style>
</head>
